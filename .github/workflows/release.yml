name: Release Binaries

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # Required for creating releases

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64 # Skip win/arm64 unless you really need it

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Needed for version info

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # 1.22 or 1.23 is current
          cache: true

      - name: Get version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          BINARY_NAME=fox-${{ steps.version.outputs.VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}
          if [ "${{ matrix.goos }}" = "windows" ]; then BINARY_NAME+='.exe'; fi

          go build -trimpath -ldflags="-s -w -X main.version=${{ steps.version.outputs.VERSION }}" -o $BINARY_NAME main.go

          # Create checksum
          sha256sum $BINARY_NAME > $BINARY_NAME.sha256

      - name: Release
        uses: softprops/action-gh-release@v2 # v2 is current
        with:
          files: fox-*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
